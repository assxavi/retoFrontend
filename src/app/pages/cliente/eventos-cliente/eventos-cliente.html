<app-barra-lateral
title="Eventos"
[links]="[
    { label: 'Activos', route: '/cliente/eventos/activos', icon: 'fa-circle-check' },
    { label: 'Cancelados', route: '/cliente/eventos/cancelados', icon: 'fa-ban' },
    { label: 'Terminados', route: '/cliente/eventos/terminados', icon: 'fa-flag' },
]">
</app-barra-lateral>
<app-tabla
[columnas]="[
{campo: 'nombre', label: 'Nombre'},
{campo: 'fecha', label: 'Fecha'},
{campo: 'precio', label: 'Precio'}
]"
[datos]="eventos"
[acciones]="{verDetalle: true, cancelar: true, reservar: true}"
[tamanoPagina]="2"
(verDetalle)="onVerDetalle($event)"
(cancelar)="onCancelar($event)"
(reservar)="onReservar($event)">
</app-tabla>
