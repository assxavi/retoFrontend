<app-barra-lateral
title="Eventos"
[links]="[
    { label: 'Activos', route: '/eventos/activos', icon: 'fa-circle-check' },
    { label: 'Cancelados', route: '/eventos/cancelados', icon: 'fa-ban' },
    { label: 'Terminados', route: '/eventos/terminados', icon: 'fa-flag' },
]">
</app-barra-lateral>
<app-tabla
[columnas]="[
{campo: 'nombre', label: 'Nombre'},
{campo: 'fechaInicio', label: 'Fecha'},
{campo: 'precio', label: 'Precio'}
]"
[datos]="eventosFiltrados"
[acciones]="{verDetalle: true, cancelar: true, reservar: true}"
[tamanoPagina]="5"
(verDetalle)="onVerDetalle($event)"
(cancelar)="onCancelar($event)"
(reservar)="onReservar($event)">
</app-tabla>
