<nav class="app-navbar">
  <div class="app-navbar__brand">
    <a routerLink="/"><img src="assets/img/logo.png" alt="Bailes de Salon" /></a>
  </div>

  <div class="app-navbar__menu">
    <!-- Sin login o cliente: va a /eventos -->
    @if (!authService.isLoggedIn() || (!isAdmin)) {
      <a [routerLink]="isAdmin ? '/admin/eventos' : (authService.isLoggedIn() ? '/clientes/eventos' : '/eventos')" 
         routerLinkActive="active">
        Eventos
      </a>
    }

    <!-- Admin: gestión -->
    @if (isAdmin) {
      <a routerLink="/admin/eventos" routerLinkActive="active">Gestión</a>
    }

    <!-- Cliente logueado: mis reservas -->
    @if (authService.isLoggedIn() && !isAdmin) {
      <a routerLink="/clientes/mis-reservas" routerLinkActive="active">Mis Reservas</a>
    }
  </div>

  <div class="app-navbar__user">
    @if (authService.isLoggedIn()) {
      <span>{{ username }}</span>
      <button (click)="logout()">Cerrar Sesión</button>
    } @else {
      <a routerLink="/login" class="btn-login">Iniciar Sesión</a>
      <a routerLink="/registro" class="btn-registro">Registro</a>
    }
  </div>
</nav>
